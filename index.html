<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jenco Autoparts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #2D3A4F;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .logo-wrap { background: #2D3A4F;
      width: 200px;
      margin-bottom: 4px;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    .tagline {
      color: #8A9BB0;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: -8px;
      margin-bottom: 4px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.15s, opacity 0.15s;
      color: #fff;
    }

    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .btn-whatsapp { background: #25D366; }
    .btn-web      { background: #C95A2A; }
    .btn-facebook { background: #1877F2; }
    .btn-instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .btn-email    { background: #3D3D3D; border: 1px solid #555555; }

    .btn-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-icon svg { width: 24px; height: 24px; fill: white; }

    .btn-text { flex: 1; }
    .btn-label { display: block; font-size: 15px; }
    .btn-sub   { display: block; font-size: 11px; font-weight: 400; opacity: 0.8; margin-top: 1px; }

    .footer {
      color: #4a5a6e;
      font-size: 11px;
      margin-top: 8px;
    }
  </style>
</head>
